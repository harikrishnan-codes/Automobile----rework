<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobile</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="service.css">
    <link rel="stylesheet" href="./root.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>
<body>

    <style>

/* --- 404 Error Page Section --- */
.error-page {
    position: relative;
    height: 100vh;
    width: 100%;
    background-color: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    text-align: center;
}

/* 1. Pulsing Background Glow */
.error-bg-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245, 185, 0, 0.1) 0%, transparent 70%);
    animation: radarPulse 4s ease-in-out infinite;
    z-index: 1;
}

@keyframes radarPulse {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.3; }
}

/* 2. Digital Grid Overlay */
.error-grid-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 2;
}

.error-container {
    position: relative;
    z-index: 3;
}

/* --- Error Content --- */
.error-code {
    font-size: clamp(6rem, 15vw, 10rem);
    font-weight: 900;
    color: var(--text-header);
    line-height: 1;
    letter-spacing: -5px;
    margin-bottom: 10px;
    animation: glitchText 3s infinite;
}

@keyframes glitchText {
    0% { text-shadow: 2px 0 var(--accent-red), -2px 0 var(--accent-blue); }
    1% { text-shadow: -2px 0 var(--accent-red), 2px 0 var(--accent-blue); }
    2% { text-shadow: 0 0 white; }
    100% { text-shadow: 0 0 white; }
}

.error-divider {
    width: 80px;
    height: 4px;
    background: var(--primary-color);
    margin: 20px auto;
}

.error-message {
    font-size: 2rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

.error-description {
    color: var(--text-muted);
    max-width: 500px;
    margin: 0 auto 40px;
    line-height: 1.6;
}

.error-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* --- Responsive (768px) --- */
@media (max-width: 768px) {
    .error-bg-glow {
        width: 300px;
        height: 300px;
    }

    .error-actions {
        flex-direction: column;
        align-items: center;
    }

    .error-actions .btn {
        width: 100%;
        max-width: 280px;
    }

    .error-message {
        font-size: 1.5rem;
    }
}

    </style>

    <div class="error-page">
    <div class="error-bg-glow"></div>
    <div class="error-grid-overlay"></div>

    <div class="container error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <div class="error-divider"></div>
            <h2 class="error-message">ENGINE <span class="text-glow">STALLED</span></h2>
            <p class="error-description">
                It looks like you've taken a wrong turn. The page you are looking for has been moved or doesn't exist in our current inventory.
            </p>
            
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">Return to Home</a>
                <!-- <a href="contact.html" class="btn btn-secondary">Report Issue</a> -->
            </div>
        </div>
    </div>
</div>
    
</body>
</html>
