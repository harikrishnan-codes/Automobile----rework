<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobile</title>
    <link rel="icon" href="./assets/bg remove.webp">

    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="./root.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

    <section class="auth-portal">
        <div class="container">

            <div id="signup-section" class="auth-card scroll-reveal">
                <div class="auth-header">
                    <h2>SYSTEM <span class="text-glow">REGISTRATION</span></h2>
                    <p>Initialize your performance profile</p>
                </div>
                <form id="signup-form">
                    <div class="field-group">
                        <select id="signup-role" required>
                            <option value="" disabled selected>Select Access Level</option>
                            <option value="admin">System Administrator</option>
                            <option value="customer">Elite Customer</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>

                    <div class="field-group password-container">
                        <input type="password" id="pass-signup" placeholder="Security Key" required>
                        <span class="toggle-eye" onclick="togglePass('pass-signup', this)">👁️</span>
                    </div>

                    <div class="field-group password-container">
                        <input type="password" id="pass-confirm" placeholder="Confirm Security Key" required>
                        <span class="toggle-eye" onclick="togglePass('pass-confirm', this)">👁️</span>
                    </div>

                    <button type="submit" class="btn-auth">Initialize Profile</button>
                </form>
                <p class="auth-switch">Already synced? <a href="javascript:void(0)"
                        onclick="switchTab('login')">Login</a></p>
            </div>




            <div id="login-section" class="auth-card" style="display:none;">
                <div class="auth-header">
                    <h2>USER <span class="text-glow">AUTHENTICATION</span></h2>
                    <p>Verify your driver credentials</p>
                </div>
                <form id="login-form">
                    <div class="field-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="field-group password-container">
                        <input type="password" id="pass-login" placeholder="Security Key" required>
                        <span class="toggle-eye" onclick="togglePass('pass-login', this)">👁️</span>
                    </div>
                    <button type="submit" class="btn-auth">Access Terminal</button>
                </form>
                <p class="auth-switch">Forgot Key? <span onclick="switchTab('forgot')">Recover</span></p>
            </div>

            <div id="forgot-section" class="auth-card" style="display:none;">
                <div class="auth-header">
                    <h2>KEY <span class="text-glow">RECOVERY</span></h2>
                    <p>Request credential reset</p>
                </div>
                <form id="forgot-form">
                    <div class="field-group">
                        <input type="email" placeholder="Registered Email" required>
                    </div>
                    <button type="submit" class="btn-auth">Verify Identity</button>
                </form>
                <p class="auth-switch">Back to <span onclick="switchTab('login')">Login</span></p>
            </div>

        </div>
    </section>




    <script src="./script.js"></script>

    <script>

        document.addEventListener("DOMContentLoaded", function () {

    // 1. TAB SWITCHING (Signup / Login / Forgot)
    window.switchTab = function (tabName) {
        document.getElementById('signup-section').style.display = 'none';
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('forgot-section').style.display = 'none';

        const target = document.getElementById(tabName + '-section');
        if (target) {
            target.style.display = 'block';
            AOS.refresh();
        }
    };

    // 2. PASSWORD VISIBILITY TOGGLE
    window.togglePass = function (inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            iconElement.textContent = "🙈";
            iconElement.style.color = "var(--primary-color)";
        } else {
            passwordInput.type = "password";
            iconElement.textContent = "👁️";
            iconElement.style.color = "inherit";
        }
    };

    // 3. SIGNUP LOGIC (Redirects to Login)
    const signupForm = document.getElementById('signup-form');
    if (signupForm) {
        signupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const p1 = document.getElementById('pass-signup').value;
            const p2 = document.getElementById('pass-confirm').value;

            if (p1 !== p2) {
                alert("Security Keys do not match!");
                return;
            }

            // Capture the role during signup to remember it for login
            const role = document.getElementById('signup-role').value;
            localStorage.setItem('userRole', role);

            alert("Profile Verified. Redirecting to Login Terminal...");
            switchTab('login');
        });
    }

    // 4. INTEGRATED LOGIN & RBAC REDIRECTION
    const loginForm = document.getElementById('login-form');
    if (loginForm) {
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            // CAPTURE EMAIL FOR DASHBOARD
            const emailInput = this.querySelector('input[type="email"]').value;
            localStorage.setItem('sessionUserEmail', emailInput);

            // GET ROLE (Stored during signup or default to customer)
            const selectedRole = localStorage.getItem('userRole') || 'customer';

            if (selectedRole === 'admin') {
                alert("Admin Access Granted. Syncing Terminal...");
                window.location.href = "admin.html"; // Ensure this matches your admin filename
            } else {
                alert("Customer Access Granted. Syncing Terminal...");
                window.location.href = "customer.html"; // Ensure this matches your customer filename
            }
        });
    }

    // 5. FORGOT PASSWORD
    const forgotForm = document.getElementById('forgot-form');
    if (forgotForm) {
        forgotForm.addEventListener('submit', function (e) {
            e.preventDefault();
            window.location.href = "error.html";
        });
    }
});

    </script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 900,
            easing: 'ease-in-out',
            once: true,
        });

        // data-aos="fade-up"
        // fade-up, fade-down, fade-left, fade-right, zoom-in,	slide-up, flip-left	

    </script>

</body>

</html>
